# ──────────────────────────────────────────────────────
# Prepp.ai — Render Blueprint
# Deploy:  koble repo → Render → "New Blueprint Instance"
# Docs:    https://docs.render.com/infrastructure-as-code
# ──────────────────────────────────────────────────────

services:
  # ── Backend (FastAPI) ──────────────────────────────
  - type: web
    name: prepp-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    region: frankfurt          # Closest to Norway
    plan: free                 # Change to "starter" for always-on
    healthCheckPath: /api/v1/health
    envVars:
      # Database (Supabase)
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # AI
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Redis — reference the Render Redis instance
      - key: REDIS_URL
        fromService:
          name: prepp-ai-redis
          type: redis
          property: connectionString
      # CORS — will be set after frontend URL is known
      - key: CORS_ORIGINS
        sync: false
      # App
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

  # ── Frontend (Next.js) ─────────────────────────────
  - type: web
    name: prepp-ai-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      # Backend URL — set manually after first deploy:
      # https://prepp-ai-backend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── Redis ──────────────────────────────────────────
  - type: redis
    name: prepp-ai-redis
    region: frankfurt
    plan: free                 # 25 MB, fine for caching
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []            # only internal access
