# ──────────────────────────────────────────────────────
# Prepp.ai — Render Blueprint
# Deploy:  koble repo → Render → "New Blueprint Instance"
# Docs:    https://docs.render.com/infrastructure-as-code
#
# IMPORTANT: Set these environment variables in Render dashboard:
# - GEMINI_API_KEY: Get from https://makersuite.google.com/app/apikey
# - SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY (optional)
# - CORS_ORIGINS: Set after frontend deployment (e.g., https://prepp-ai-frontend.onrender.com)
# ──────────────────────────────────────────────────────

services:
  # ── Backend (FastAPI) ──────────────────────────────
  # Handles AI processing with Google Gemini
  # Health check: GET /api/v1/health
  - type: web
    name: prepp-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    region: frankfurt          # Closest to Norway
    plan: free                 # Change to "starter" for always-on
    healthCheckPath: /api/v1/health
    envVars:
      # Database (Supabase)
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # AI
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Redis — reference the Render Redis instance
      - key: REDIS_URL
        fromService:
          name: prepp-ai-redis
          type: redis
          property: connectionStringUrl
      # CORS — will be set after frontend URL is known
      - key: CORS_ORIGINS
        sync: false
      # App
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_MODEL
        value: gemini-1.5-pro
      - key: MAX_BRIEF_TOKENS
        value: "4000"

  # ── Frontend (Next.js) ─────────────────────────────
  # User interface for generating teaching briefs
  # After deploy: Set NEXT_PUBLIC_API_URL to backend URL
  - type: web
    name: prepp-ai-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      # Backend URL — set manually after first deploy:
      # https://prepp-ai-backend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── Redis ──────────────────────────────────────────
  # Caching layer for API responses and user sessions
  # Automatically connected to backend via REDIS_URL
  - type: redis
    name: prepp-ai-redis
    region: frankfurt
    plan: free                 # 25 MB, fine for caching
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []            # only internal access
