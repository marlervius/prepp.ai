version: '3.8'

services:
  # Frontend (Next.js)
  frontend:
    build:
      context: ./prepp-ai-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    volumes:
      - ./prepp-ai-app:/app
      - /app/node_modules

  # Backend (FastAPI)
  backend:
    build:
      context: ./prepp-ai-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
    depends_on:
      - redis
    volumes:
      - ./prepp-ai-backend:/app

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # PostgreSQL (for local development, use Supabase in production)
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=preppai
      - POSTGRES_USER=preppai
      - POSTGRES_PASSWORD=preppai123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: